idea:
  title: 'Decoding the Role of Trace Impurities: Systematic Study of Unintentional
    Dopants on CE Using Ultra-Pure and Deliberately Doped Systems'
  domain: battery
  hypothesis: 'Certain trace elements or compounds, often considered contaminants,
    may catalyze favorable SEI formation or lithium kinetics, and their controlled
    introduction could improve Coulombic Efficiency.

    '
